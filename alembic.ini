[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///./airedteam.db

[loggers]
keys = root
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARN
handlers = console
[handler_console]
class = StreamHandler
args = (sys.stdout,)
formatter = generic
[formatter_generic]
format = %(levelname)s %(name)s %(message)s
